name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf creft-${{ matrix.target }}.tar.gz creft
          shasum -a 256 creft-${{ matrix.target }}.tar.gz > creft-${{ matrix.target }}.tar.gz.sha256

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            target/${{ matrix.target }}/release/creft-${{ matrix.target }}.tar.gz \
            target/${{ matrix.target }}/release/creft-${{ matrix.target }}.tar.gz.sha256

  publish-crates:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  homebrew:
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          mkdir -p artifacts
          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            gh release download "${TAG}" -p "creft-${target}.tar.gz.sha256" -D artifacts
          done

      - name: Extract checksums
        id: checksums
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          TAG="${{ needs.release-please.outputs.tag_name }}"

          SHA_AARCH64_DARWIN=$(awk '{print $1}' artifacts/creft-aarch64-apple-darwin.tar.gz.sha256)
          SHA_X86_64_DARWIN=$(awk '{print $1}' artifacts/creft-x86_64-apple-darwin.tar.gz.sha256)
          SHA_X86_64_LINUX=$(awk '{print $1}' artifacts/creft-x86_64-unknown-linux-gnu.tar.gz.sha256)
          SHA_AARCH64_LINUX=$(awk '{print $1}' artifacts/creft-aarch64-unknown-linux-gnu.tar.gz.sha256)

          echo "sha_aarch64_darwin=${SHA_AARCH64_DARWIN}" >> "$GITHUB_OUTPUT"
          echo "sha_x86_64_darwin=${SHA_X86_64_DARWIN}" >> "$GITHUB_OUTPUT"
          echo "sha_x86_64_linux=${SHA_X86_64_LINUX}" >> "$GITHUB_OUTPUT"
          echo "sha_aarch64_linux=${SHA_AARCH64_LINUX}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: chrisfentiman/homebrew-creft
          token: ${{ secrets.CREFT_TAP_TOKEN }}
          path: homebrew-creft

      - name: Generate formula and push
        env:
          VERSION: ${{ steps.checksums.outputs.version }}
          TAG: ${{ steps.checksums.outputs.tag }}
          SHA_AARCH64_DARWIN: ${{ steps.checksums.outputs.sha_aarch64_darwin }}
          SHA_X86_64_DARWIN: ${{ steps.checksums.outputs.sha_x86_64_darwin }}
          SHA_X86_64_LINUX: ${{ steps.checksums.outputs.sha_x86_64_linux }}
          SHA_AARCH64_LINUX: ${{ steps.checksums.outputs.sha_aarch64_linux }}
        run: |
          mkdir -p homebrew-creft/Formula
          envsubst < "${GITHUB_WORKSPACE}/.github/formula.rb.template" > homebrew-creft/Formula/creft.rb
          cd homebrew-creft
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/creft.rb
          git commit -m "chore: update creft formula to ${VERSION}"
          git push
