name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/release.yml'

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['creft--release_created'] }}
      tag_name: ${{ steps.release.outputs['creft--tag_name'] }}
      version: ${{ steps.release.outputs['creft--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build (${{ matrix.target }})
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf creft-${{ needs.release-please.outputs.version }}-${{ matrix.target }}.tar.gz creft
          sha256sum creft-${{ needs.release-please.outputs.version }}-${{ matrix.target }}.tar.gz > creft-${{ needs.release-please.outputs.version }}-${{ matrix.target }}.tar.gz.sha256 2>/dev/null || shasum -a 256 creft-${{ needs.release-please.outputs.version }}-${{ matrix.target }}.tar.gz > creft-${{ needs.release-please.outputs.version }}-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: creft-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/creft-*.tar.gz
            target/${{ matrix.target }}/release/creft-*.sha256

  upload:
    name: Upload Release Assets
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} artifacts/*.tar.gz artifacts/*.sha256

  publish-crates:
    name: Publish to crates.io
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  publish-npm:
    name: Publish to npm
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm
          npm version "${{ needs.release-please.outputs.version }}" --no-git-tag-version
          npm publish --access public

  homebrew:
    name: Update Homebrew Tap
    needs: [release-please, upload]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Extract checksums
        id: checksums
        run: |
          VERSION=${{ needs.release-please.outputs.version }}
          TAG=${{ needs.release-please.outputs.tag_name }}

          SHA_AARCH64_DARWIN=$(cat artifacts/creft-${VERSION}-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          SHA_X86_64_DARWIN=$(cat artifacts/creft-${VERSION}-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          SHA_X86_64_LINUX=$(cat artifacts/creft-${VERSION}-x86_64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')
          SHA_AARCH64_LINUX=$(cat artifacts/creft-${VERSION}-aarch64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')

          echo "sha_aarch64_darwin=${SHA_AARCH64_DARWIN}" >> "$GITHUB_OUTPUT"
          echo "sha_x86_64_darwin=${SHA_X86_64_DARWIN}" >> "$GITHUB_OUTPUT"
          echo "sha_x86_64_linux=${SHA_X86_64_LINUX}" >> "$GITHUB_OUTPUT"
          echo "sha_aarch64_linux=${SHA_AARCH64_LINUX}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: chrisfentiman/homebrew-creft
          token: ${{ secrets.CREFT_TAP_TOKEN }}
          path: homebrew-creft

      - name: Generate formula and push
        env:
          VERSION: ${{ steps.checksums.outputs.version }}
          TAG: ${{ steps.checksums.outputs.tag }}
          SHA_AARCH64_DARWIN: ${{ steps.checksums.outputs.sha_aarch64_darwin }}
          SHA_X86_64_DARWIN: ${{ steps.checksums.outputs.sha_x86_64_darwin }}
          SHA_X86_64_LINUX: ${{ steps.checksums.outputs.sha_x86_64_linux }}
          SHA_AARCH64_LINUX: ${{ steps.checksums.outputs.sha_aarch64_linux }}
        run: |
          mkdir -p homebrew-creft/Formula
          envsubst < "${GITHUB_WORKSPACE}/.github/formula.rb.template" > homebrew-creft/Formula/creft.rb
          cd homebrew-creft
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/creft.rb
          git commit -m "chore: update creft formula to ${VERSION}"
          git push
