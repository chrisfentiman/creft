name: Deploy Install Script

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/install.sh'
      - 'cloudflare/workers/creft-run.js'
      - 'cloudflare/wrangler.jsonc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build worker JS
        run: |
          mkdir -p cloudflare/workers/dist
          TEMPLATE="cloudflare/workers/creft-run.js"
          GENERATED="cloudflare/workers/dist/creft-run.js"
          sed -n '/^\/\/ __INSTALL_SCRIPT_CONTENT__$/q;p' "$TEMPLATE" > "$GENERATED"
          sed 's/\\/\\\\/g; s/`/\\`/g; s/\${/\\${/g' scripts/install.sh >> "$GENERATED"
          sed -n '/^\/\/ __INSTALL_SCRIPT_CONTENT__$/,$ { /^\/\/ __INSTALL_SCRIPT_CONTENT__$/d; p; }' "$TEMPLATE" >> "$GENERATED"

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
        working-directory: cloudflare
